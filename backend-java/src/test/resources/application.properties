# H2 in PostgreSQL compatibility mode for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=true;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Suppress noisy actuator env output in tests
management.endpoints.web.exposure.include=health

nutrifridge.fastapi.base-url=http://localhost:9999
nutrifridge.fastapi.connect-timeout-ms=500
nutrifridge.fastapi.read-timeout-ms=1000
nutrifridge.fastapi.retry-max-attempts=1
nutrifridge.fastapi.retry-delay-ms=100
nutrifridge.cors.allowed-origins=http://localhost:3000
nutrifridge.async.core-pool-size=2
nutrifridge.async.max-pool-size=2
nutrifridge.async.queue-capacity=10
nutrifridge.async.thread-name-prefix=test-meal-plan-
