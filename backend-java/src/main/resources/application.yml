spring:
  application:
    name: nutrition-core

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nutrifridge_java}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

nutrifridge:
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
    connect-timeout-ms: ${FASTAPI_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${FASTAPI_READ_TIMEOUT_MS:10000}
    retry-max-attempts: ${FASTAPI_RETRY_MAX:3}
    retry-delay-ms: ${FASTAPI_RETRY_DELAY_MS:500}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:8}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:50}
    thread-name-prefix: meal-plan-
